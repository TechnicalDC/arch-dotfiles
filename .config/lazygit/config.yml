gui:
  border: rounded
  showIcons: false
  theme:
    activeBorderColor:
      - '#f16c75'
      - bold
    inactiveBorderColor:
      - '#606b9d'
    optionsTextColor:
      - '#a48cf2'
    selectedLineBgColor:
      - '#292e42'
    selectedLineFgColor:
      - '#ebfafa'
    cherryPickedCommitBgColor:
      - '#04d1f9'
    cherryPickedCommitFgColor:
      - '#04d1f9'
    unstagedChangesColor:
      - '#f16c75'
    defaultFgColor:
      - '#ebfafa'
    searchingActiveBorderColor:
      - '#a48cf2'

  authorColors:
    '*': '#f16c75'

  spinner:
    frames:
     - '⠋'
     - '⠙'
     - '⠹'
     - '⠸'
     - '⠼'
     - '⠴'
     - '⠦'
     - '⠧'
     - '⠇'
     - '⠏'
git:
  parseEmoji: true
