gui:
  border: rounded
  showIcons: false
  theme:
    activeBorderColor:
      - '#fd4663'
      - bold
    inactiveBorderColor:
      - '#5e6b72'
    optionsTextColor:
      - '#70cc66'
    selectedLineBgColor:
      - '#2a363c'
    selectedLineFgColor:
      - '#f2f2f3'
    cherryPickedCommitBgColor:
      - '#5c6ad6'
    cherryPickedCommitFgColor:
      - '#5c6ad6'
    unstagedChangesColor:
      - '#fd4663'
    defaultFgColor:
      - '#f2f2f3'
    searchingActiveBorderColor:
      - '#70cc66'

  authorColors:
    '*': '#fd4663'

  spinner:
    frames:
     - '⠋'
     - '⠙'
     - '⠹'
     - '⠸'
     - '⠼'
     - '⠴'
     - '⠦'
     - '⠧'
     - '⠇'
     - '⠏'
git:
  parseEmoji: true
