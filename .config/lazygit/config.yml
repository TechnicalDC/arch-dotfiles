gui:
  border: rounded
  showIcons: false
  theme:
    activeBorderColor:
      - '#bf616a'
      - bold
    inactiveBorderColor:
      - '#707d99'
    optionsTextColor:
      - '#5e81ac'
    selectedLineBgColor:
      - '#3b4252'
    selectedLineFgColor:
      - '#eceff4'
    cherryPickedCommitBgColor:
      - '#88c0d0'
    cherryPickedCommitFgColor:
      - '#88c0d0'
    unstagedChangesColor:
      - '#bf616a'
    defaultFgColor:
      - '#eceff4'
    searchingActiveBorderColor:
      - '#5e81ac'

  authorColors:
    '*': '#bf616a'

  spinner:
    frames:
     - '⠋'
     - '⠙'
     - '⠹'
     - '⠸'
     - '⠼'
     - '⠴'
     - '⠦'
     - '⠧'
     - '⠇'
     - '⠏'
git:
  parseEmoji: true
