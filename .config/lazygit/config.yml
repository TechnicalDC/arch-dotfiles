gui:
  border: rounded
  showIcons: false
  theme:
    activeBorderColor:
      - '#ffb4ab'
      - bold
    inactiveBorderColor:
      - '#919191'
    optionsTextColor:
      - '#e2e2e2'
    selectedLineBgColor:
      - '#1f1f1f'
    selectedLineFgColor:
      - '#e2e2e2'
    cherryPickedCommitBgColor:
      - '#c6c6c6'
    cherryPickedCommitFgColor:
      - '#c6c6c6'
    unstagedChangesColor:
      - '#ffb4ab'
    defaultFgColor:
      - '#e2e2e2'
    searchingActiveBorderColor:
      - '#e2e2e2'

  authorColors:
    '*': '#ffb4ab'

  spinner:
    frames:
     - '⠋'
     - '⠙'
     - '⠹'
     - '⠸'
     - '⠼'
     - '⠴'
     - '⠦'
     - '⠧'
     - '⠇'
     - '⠏'
git:
  parseEmoji: true
