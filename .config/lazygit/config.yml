gui:
  border: rounded
  showIcons: false
  theme:
    activeBorderColor:
      - '#fd4663'
      - bold
    inactiveBorderColor:
      - '#5b6f67'
    optionsTextColor:
      - '#6690cc'
    selectedLineBgColor:
      - '#2c3a34'
    selectedLineFgColor:
      - '#f2f3f2'
    cherryPickedCommitBgColor:
      - '#5ccfd6'
    cherryPickedCommitFgColor:
      - '#5ccfd6'
    unstagedChangesColor:
      - '#fd4663'
    defaultFgColor:
      - '#f2f3f2'
    searchingActiveBorderColor:
      - '#6690cc'

  authorColors:
    '*': '#fd4663'

  spinner:
    frames:
     - '⠋'
     - '⠙'
     - '⠹'
     - '⠸'
     - '⠼'
     - '⠴'
     - '⠦'
     - '⠧'
     - '⠇'
     - '⠏'
git:
  parseEmoji: true
