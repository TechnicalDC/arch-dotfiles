gui:
  border: rounded
  showIcons: false
  theme:
    activeBorderColor:
      - '#fd4663'
      - bold
    inactiveBorderColor:
      - '#696074'
    optionsTextColor:
      - '#cc669c'
    selectedLineBgColor:
      - '#321d49'
    selectedLineFgColor:
      - '#f2f2f3'
    cherryPickedCommitBgColor:
      - '#d25cd6'
    cherryPickedCommitFgColor:
      - '#d25cd6'
    unstagedChangesColor:
      - '#fd4663'
    defaultFgColor:
      - '#f2f2f3'
    searchingActiveBorderColor:
      - '#cc669c'

  authorColors:
    '*': '#fd4663'

  spinner:
    frames:
     - '⠋'
     - '⠙'
     - '⠹'
     - '⠸'
     - '⠼'
     - '⠴'
     - '⠦'
     - '⠧'
     - '⠇'
     - '⠏'
git:
  parseEmoji: true
